<!DOCTYPE html>

<head>

    <style>
        :root {
            --primary-color: #4a90e2;

            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .progress-bar {
            text-align: right;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .audio-section {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        audio {
            width: 100%;
        }

        #userInput {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            line-height: 1.6;
            background-color: #fff;
            transition: border-color 0.3s;
            outline: none;
            overflow-y: auto;
        }

        #userInput:focus {
            border-color: var(--primary-color);
        }

        /* Khi ô trống, hiển thị placeholder giống DailyDictation */
        #userInput:empty:before {
            content: attr(placeholder);
            color: #999;
            font-size: 15px;
        }
        }

        .word-count {
            text-align: right;
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-submit { background-color: var(--primary-color); color: white; }
        .btn-submit:hover { background-color: #357abd; }
        
        .btn-hint { background-color: #f39c12; color: white; }
        .btn-hint:hover { background-color: #d68010; }

        .btn-next { background-color: #e0e0e0; color: #333; }
        .btn-next:hover { background-color: #d0d0d0; }

        .result-section {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .result-active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .comparison-box {
            background-color: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #ddd;
            border-radius: 4px;
            line-height: 1.6;
        }

        .w-correct {
            color: var(--success-color);
            font-weight: 600;
            display: inline-block;
            margin-right: 5px;
        }

        .w-incorrect {
            color: var(--danger-color);
            font-weight: bold;
            text-decoration: underline;
            display: inline-block;
            margin-right: 5px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<div class="container">

    <div class="subtitle">Nghe và chép lại chính xác câu bạn nghe được</div>

    <div class="audio-section">

    </div>

    <div id="userInput" contenteditable="true" placeholder="Nhập câu trả lời của bạn tại đây... (Nhấn Space khi ô trống để Bật/Tắt Audio, nhấn Enter để Check)"></div>
    <div class="word-count" id="wordCount">Số từ: 0</div>

    <div class="controls">
        <button class="btn-hint" id="hintBtn" onclick="giveHint()">Gợi ý 1 từ</button>
        <button class="btn-submit" id="submitBtn" onclick="checkAnswer()">Check toàn bộ</button>
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Câu Tiếp Theo</button>
    </div>

    let questions = [];
    let currentIndex = 0;
    let isAnswerShowing = false; // Trạng thái ẩn/hiện đáp án đầy đủ

    // ==========================================
    // 2. KHỞI TẠO & XÁO TRỘN MẢNG (Shuffle)
    // ==========================================
    function shuffleQuestions() {
        questions = [...originalQuestions];
        for (let i = questions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [questions[i], questions[j]] = [questions[j], questions[i]];
        }
    }

    function initQuiz() {
        shuffleQuestions();
        currentIndex = 0;
        if(questions.length > 0) {
            loadQuestion(currentIndex);
        } else {
            alert("Vui lòng thêm câu hỏi vào danh sách mã nguồn!");
        }
    }

    // ==========================================
    // 3. TẢI CÂU HỎI HIỆN TẠI
    // ==========================================
    function loadQuestion(index) {
        const audioPlayer = document.getElementById('audioPlayer');
        const userInput = document.getElementById('userInput');
        const progress = document.getElementById('progress');
        const resultSection = document.getElementById('resultSection');
        const fullAnswerBox = document.getElementById('fullAnswerBox');
        const toggleAnsBtn = document.getElementById('toggleAnsBtn');

        progress.innerText = `Câu: ${index + 1}/${questions.length}`;
        audioPlayer.src = questions[index].audio;
        userInput.value = "";
        document.getElementById('wordCount').innerText = "Số từ: 0";
        
        // Reset trạng thái hiển thị đáp án ẩn
        resultSection.classList.remove('result-active');
        fullAnswerBox.style.display = "none";
        toggleAnsBtn.innerText = "[Xem đáp án đầy đủ]";
        isAnswerShowing = false;

        audioPlayer.load(); 
    }

        document.getElementById('wordCount').innerText = `Số từ: ${words.length}`;
    });

    // ==========================================
    // XỬ LÝ PHÍM TẮT: ENTER VÀ CTRL + SPACE
    // ==========================================
    document.getElementById('userInput').addEventListener('keydown', function(event) {
        const audioPlayer = document.getElementById('audioPlayer');

        // 1. Nhấn ENTER để check đáp án giống DailyDictation
        if (event.key === 'Enter') {
            event.preventDefault(); // Chặn xuống dòng
            checkAnswer();
        }

        // 2. Nhấn tổ hợp phím CTRL + SPACE (hoặc phím Space khi ô trống) để Bật/Tắt Audio
        if (event.key === ' ' || event.code === 'Space') {
            // Trường hợp 1: Ô nhập liệu đang trống -> Nhấn Space đơn thuần là Bật/Tắt nhạc
            // Trường hợp 2: Đang gõ chữ -> Nhấn giữ Ctrl + Space để Bật/Tắt nhạc mà không bị dính dấu cách
            if (this.innerText.trim() === "" || event.ctrlKey) {
                event.preventDefault(); // Ngăn chặn hành vi gõ dấu cách mặc định
                if (audioPlayer.paused) {
                    audioPlayer.play();
                } else {
                    audioPlayer.pause();
                }

    // ==========================================
    // GỢI Ý 1 TỪ TIẾP THEO
    // ==========================================
    function giveHint() {
        const userInput = document.getElementById('userInput');
        const correctText = questions[currentIndex].transcript;
        
        const userWords = userInput.value.trim().split(/\s+/).filter(w => w.length > 0);
        const correctWords = correctText.split(/\s+/);

        let nextWordHint = "";

        for (let i = 0; i < correctWords.length; i++) {
            if (!userWords[i] || cleanWord(userWords[i]) !== cleanWord(correctWords[i])) {
                nextWordHint = correctWords[i];
                break;
            }
        }

        if (nextWordHint) {
            if (userInput.value.trim() === "") {
                userInput.value = nextWordHint;
            } else {
                const currentText = userInput.value;
                userInput.value = currentText.match(/\s$/) ? currentText + nextWordHint : currentText + " " + nextWordHint;
            }
            userInput.dispatchEvent(new Event('input'));
            userInput.focus();
        } else {
            alert("Bạn đã gõ chính xác hoàn toàn rồi, không cần gợi ý nữa!");
        }
    }

    // ==========================================
    // 4. KIỂM TRA ĐÁP ÁN & ĐIỀU CHỈNH Ô NHẬP LIỆU
    // ==========================================
    function cleanWord(word) {
        if (!word) return "";
        return word.replace(/^[.,\/#!$%\^&\*;:{}=\-_`~()]+|[.,\/#!$%\^&\*;:{}=\-_`~()]+$/g, "").toLowerCase();
    }

    function checkAnswer() {
        const userInput = document.getElementById('userInput');
        const userText = userInput.value.trim();
        const correctText = questions[currentIndex].transcript;

        if (!userText) {
            alert("Vui lòng gõ nội dung nghe được trước khi nộp!");
            return;
        }

        const userWords = userText.split(/\s+/);
        const correctWords = correctText.split(/\s+/);

        let correctCount = 0;
        let htmlResult = "";
        let updatedUserWords = []; // Mảng chứa các từ sau khi lọc lỗi để đưa ngược lại ô nhập liệu

        userWords.forEach((uWord, index) => {
            const cleanUWord = cleanWord(uWord);
            const correspondingCorrectWord = correctWords[index];

            if (correspondingCorrectWord && cleanUWord === cleanWord(correspondingCorrectWord)) {
                correctCount++;
                htmlResult += `<span class="correct">${uWord}</span> `;
                // Từ đúng -> Giữ lại nguyên vẹn trong ô nhập liệu
                updatedUserWords.push(uWord);
            } else {
                htmlResult += `<span class="incorrect">${uWord}</span> `;
                // Từ sai -> Không thêm vào updatedUserWords (tương đương với việc gạch bỏ/xóa đi trong ô nhập liệu)
            }
        });

        // 1. Hiển thị bảng điểm và màu sắc trực quan phía dưới
        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.innerHTML = `Khớp: <span style="color: var(--primary-color)">${correctCount}/${correctWords.length}</span> từ hệ thống.`;
        
        const comparisonDisplay = document.getElementById('comparisonDisplay');
        comparisonDisplay.innerHTML = htmlResult + `<br><br><small style="color: #888">* Chú thích: <span class="correct">Đúng từ & thứ tự</span> | <span class="incorrect">Sai chính tả hoặc sai vị trí</span></small>`;

        document.getElementById('fullAnswerBox').innerText = correctText;
        document.getElementById('resultSection').classList.add('result-active');

        // 2. CẬP NHẬT LẠI Ô NHẬP LIỆU: Chỉ giữ lại từ đúng, tự động thêm dấu cách ở cuối để người dùng gõ tiếp câu sau luôn
        if (updatedUserWords.length > 0) {
            userInput.value = updatedUserWords.join(" ") + " ";
        } else {
            userInput.value = ""; // Nếu sai hết thì xóa trắng để gõ lại từ đầu
        }
        
        // Kích hoạt lại sự kiện thay đổi số từ hiển thị
        userInput.dispatchEvent(new Event('input'));
        userInput.focus();
    }

    // ẨN / HIỆN ĐÁP ÁN ĐẦY ĐỦ
    function toggleFullAnswer() {
        const fullAnswerBox = document.getElementById('fullAnswerBox');
        const toggleAnsBtn = document.getElementById('toggleAnsBtn');

        if (!isAnswerShowing) {
            fullAnswerBox.style.display = "block";
            toggleAnsBtn.innerText = "[Ẩn đáp án đầy đủ]";
            isAnswerShowing = true;
        } else {
            fullAnswerBox.style.display = "none";
            toggleAnsBtn.innerText = "[Xem đáp án đầy đủ]";
            isAnswerShowing = false;
        }
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < questions.length) {
            loadQuestion(currentIndex);
        } else {
            if (confirm("Bạn đã hoàn thành hết các câu hỏi! Bạn có muốn trộn lại đề để học tiếp không?")) {
                initQuiz();
            }
        }
    }

    window.onload = initQuiz;
</script>

</body>
</html>
